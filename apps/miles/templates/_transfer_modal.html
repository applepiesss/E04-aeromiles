<div id="transferModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:var(--radius-xl);padding:2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
            <h2 style="font-size:1.1rem;">Transfer Miles</h2>
            <button onclick="closeTransferModal()">×</button>
        </div>
        
        <form method="post" action="{% url 'miles:transfer_create' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Email Penerima</label>
                <input type="email" name="email_penerima" class="form-control"
                    placeholder="email@example.com"
                    value="{{ form.email_penerima|default:'' }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Jumlah Miles</label>
                <input type="number" name="jumlah" class="form-control"
                    min="1" max="{{ award_miles }}"
                    value="{{ form.jumlah|default:'' }}" required>
                <p style="font-size:.78rem;color:var(--text-secondary);margin-top:.3rem;">
                    Saldo tersedia: {{ award_miles|floatformat:0 }} award miles
                </p>
            </div>
            <div class="form-group">
                <label class="form-label">Catatan (opsional)</label>
                <textarea name="catatan" class="form-control" rows="2" style="resize:vertical;">{{ form.catatan|default:'' }}</textarea>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:.75rem;margin-top:.5rem;">
                <button type="button" class="btn-secondary" onclick="closeTransferModal()">Batal</button>
                <button type="submit" class="btn-primary">Transfer</button>
            </div>
        </form>
    </div>
</div>
